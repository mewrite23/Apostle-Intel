name: Weekly Intel Crawl

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run crawler
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: python apostle-intel/scripts/crawl.py

     - name: Commit updated data
        run: |
          git config --global user.name "Apostle Intel Bot"
          git config --global user.email "intel-bot@apostle.co"
          git add apostle-intel/data/companies.json
          git diff --staged --quiet || git commit -m "Weekly intel update — $(date +'%Y-%m-%d')"
          git push
